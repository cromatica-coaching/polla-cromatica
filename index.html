<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polla Mundialista</title>
  <meta name="description" content="Aplicación web para pronósticos mundialistas, ranking y gestión de partidos." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand__ball">⚽</div>
      <div>
        <strong>Polla Mundialista</strong>
        <span>Predice, compite y celebra</span>
      </div>
    </div>
    <nav class="topbar__actions">
      <button class="btn btn--ghost" id="themeToggle" type="button">🌙 Modo oscuro</button>
      <button class="btn btn--ghost hidden" id="logoutBtn" type="button">Cerrar sesión</button>
    </nav>
  </header>

  <main class="layout">
    <aside class="sidebar hidden" id="sidebar">
      <button class="nav-link active" data-view="dashboard">Dashboard</button>
      <button class="nav-link" data-view="partidos">Partidos</button>
      <button class="nav-link" data-view="pronosticos">Pronósticos</button>
      <button class="nav-link" data-view="campeon">Campeón</button>
      <button class="nav-link" data-view="ranking">Ranking</button>
      <button class="nav-link admin-only" data-view="admin">Administración</button>
    </aside>

    <section class="content">
      <section class="auth-screen" id="authView">
        <div class="auth-card glass-card">
          <h1>Bienvenido a la Polla Mundialista</h1>
          <p>Regístrate o ingresa para empezar a pronosticar los partidos del Mundial.</p>

          <div class="tabs">
            <button class="tab active" data-auth-tab="login">Ingresar</button>
            <button class="tab" data-auth-tab="register">Registrarme</button>
          </div>

          <form id="loginForm" class="form auth-form">
            <label>Email
              <input type="email" id="loginEmail" required placeholder="admin@polla.com" />
            </label>
            <label>Contraseña
              <input type="password" id="loginPassword" required placeholder="123456" />
            </label>
            <button class="btn btn--primary" type="submit">Iniciar sesión</button>
            <small>Demo admin: admin@polla.com / 123456</small>
          </form>

          <form id="registerForm" class="form auth-form hidden">
            <label>Nombre de usuario
              <input type="text" id="registerName" required minlength="3" placeholder="Tu nombre" />
            </label>
            <label>Email
              <input type="email" id="registerEmail" required placeholder="tu@email.com" />
            </label>
            <label>Contraseña
              <input type="password" id="registerPassword" required minlength="6" placeholder="Mínimo 6 caracteres" />
            </label>
            <button class="btn btn--primary" type="submit">Crear cuenta</button>
          </form>
        </div>
      </section>

      <section class="app-screen hidden" id="appView">
        <div class="hero glass-card">
          <div>
            <p class="eyebrow">Mundial 2026</p>
            <h1 id="viewTitle">Dashboard</h1>
            <p id="welcomeText">Gestiona tus pronósticos y compite por el primer lugar.</p>
          </div>
          <div class="hero__badge" id="userBadge">Invitado</div>
        </div>

        <div id="dashboardView" class="view"></div>
        <div id="partidosView" class="view hidden"></div>
        <div id="pronosticosView" class="view hidden"></div>
        <div id="campeonView" class="view hidden"></div>
        <div id="rankingView" class="view hidden"></div>
        <div id="adminView" class="view hidden"></div>
      </section>
    </section>
  </main>

  <div class="modal hidden" id="modal">
    <div class="modal__overlay" data-close-modal></div>
    <div class="modal__content">
      <button class="modal__close" type="button" data-close-modal>×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/partidos.js"></script>
  <script src="js/pronosticos.js"></script>
  <script src="js/ranking.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
